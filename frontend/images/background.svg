<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f1ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede8e3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pattern -->
    <pattern id="pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#ff9f1c" opacity="0.1"/>
      <circle cx="80" cy="80" r="2" fill="#3498db" opacity="0.08"/>
      <rect x="40" y="40" width="3" height="3" fill="#27ae60" opacity="0.08"/>
    </pattern>
  </defs>
  
  <!-- Base -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Pattern overlay -->
  <rect width="1200" height="800" fill="url(#pattern)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="150" r="80" fill="#ff9f1c" opacity="0.03"/>
  <circle cx="1100" cy="650" r="120" fill="#3498db" opacity="0.03"/>
  <circle cx="600" cy="400" r="90" fill="#27ae60" opacity="0.02"/>
  
  <!-- Subtle lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ff9f1c" stroke-width="1" opacity="0.05"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#3498db" stroke-width="1" opacity="0.03"/>
</svg>